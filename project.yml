name: PostureTrainer
options:
  bundleIdPrefix: com.codysorgenfrey
  deploymentTarget:
    iOS: '18.0'
  xcodeVersion: '26.0'
settings:
  base:
    SWIFT_VERSION: '6.0'
    SWIFT_UPCOMING_FEATURE_CONCISE_MAGIC_FILE: YES
    SWIFT_STRICT_CONCURRENCY: minimal
    GENERATE_INFOPLIST_FILE: YES
    DEVELOPMENT_TEAM: 7MKBA93P3M
targets:
  PostureTrainer:
    type: application
    platform: iOS
    sources:
      - PostureTrainer
    dependencies:
      - target: PostureTrainerWidgets
    settings:
      base:
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: 'UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight'
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: 'UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight'
        PRODUCT_BUNDLE_IDENTIFIER: com.codysorgenfrey.PostureTrainer
        MARKETING_VERSION: '1.0'
        CURRENT_PROJECT_VERSION: '1'
        DEVELOPMENT_ASSET_PATHS: ''
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_NSSupportsLiveActivities: YES
  PostureTrainerWidgets:
    type: extensionkit-extension
    platform: iOS
    sources:
      - PostureTrainerWidgets
      - path: PostureTrainer/Models/PostureSessionAttributes.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.codysorgenfrey.PostureTrainer.Widgets
        INFOPLIST_KEY_CFBundleDisplayName: PostureTrainerWidgets
        INFOPLIST_KEY_NSHumanReadableCopyright: ''
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: '1.0'
        CURRENT_PROJECT_VERSION: '1'
    info:
      path: PostureTrainerWidgets/Info.plist
      properties:
        EXAppExtensionAttributes:
          EXExtensionPointIdentifier: com.apple.widgetkit-extension
schemes:
  PostureTrainer:
    build:
      targets:
        PostureTrainer: all
        PostureTrainerWidgets: all
    run:
      config: Debug
    archive:
      config: Release
